  </head>
  <body data-theme="light">
    <div class="container">
      <div class="header">
        <div class="header-left">
          <div class="logo">
            <div class="logo-icon">O</div>
            <h1>OCR</h1>
          </div>
          <span class="badge">No limits • No ads</span>
        </div>
        <div class="header-controls">
          <div class="ocr-mode-selector">
            <button class="ocr-mode-btn active" data-mode="text">Text</button>
            <button class="ocr-mode-btn" data-mode="code">Code</button>
          </div>
          <div class="mode-toggle-wrapper">
            <div class="mode-toggle" id="themeToggle"></div>
          </div>
        </div>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-content">
          <div class="drop-icon" aria-hidden="true">
            <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M18 10h22l14 14v28a6 6 0 0 1-6 6H18a6 6 0 0 1-6-6V16a6 6 0 0 1 6-6Z" />
              <path d="M40 10v14h14" />
              <path d="M24 30h16M24 38h16M24 46h10" />
            </svg>
          </div>
          <h2>Drop images here</h2>
          <p>or paste from clipboard</p>
          <div class="keyboard-hint">
            <span class="key">Ctrl</span> + <span class="key">V</span> to paste
            <span style="margin: 0 0.5rem">•</span>
            <span class="key">Enter</span> to process
          </div>
          <div class="features-hint">
            <div class="feature-item">
              <span class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M5 13l4 4 10-10" />
                </svg>
              </span>
              <span>Unlimited images</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M4 12h16" />
                  <path d="M12 4v16" />
                </svg>
              </span>
              <span>Paste support</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M8 12h8" />
                </svg>
              </span>
              <span>Privacy-first</span>
            </div>
          </div>
        </div>
      </div>

      <div class="images-preview" id="imagesPreview"></div>

      <div class="controls">
        <button class="process-btn" id="processBtn" disabled>
          <span>Process Images</span>
        </button>
        <button class="clear-btn" id="clearBtn">Clear All</button>
      </div>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">Processing...</div>
      </div>

      <div class="output-container">
        <div class="output-header">
          <div class="output-header-left">
            <h3>Extracted Text</h3>
            <span class="char-count" id="charCount">0 characters</span>
          </div>
          <div class="output-actions">
            <button class="copy-btn" id="copyBtn">
              <span>Copy</span>
            </button>
            <button class="download-btn" id="downloadBtn">
              <span>Download</span>
            </button>
          </div>
        </div>
        <textarea id="outputText" placeholder="Extracted text will appear here..." spellcheck="false"></textarea>
      </div>
    </div>

    <div class="toast" id="toast">
      <span id="toastMessage"></span>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
